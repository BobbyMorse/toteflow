app = "toteflow"
primary_region = "sea"

[build]

[env]
  PORT = "3000"

# Persistent volume for the SQLite DB. Survives redeploys and machine restarts.
# Create with: fly volumes create toteflow_data --size 1 --region sea
[[mounts]]
  source = "toteflow_data"
  destination = "/app/data"

[http_service]
  internal_port = 3000
  force_https = true
  # Keep the machine always running — the app polls TVG in the background and
  # streams live ticks over SSE. Idle-stop breaks continuous data capture.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
