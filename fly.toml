# fly.toml app configuration file generated for toteflow on 2026-07-07T22:08:16Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'toteflow'
primary_region = 'sjc'
# Give the node process time to close SQLite cleanly on deploys. The default
# 5s window contributed to the 2026-07-13 data loss (machine killed before
# WAL writes reached disk).
kill_signal = 'SIGINT'
kill_timeout = '30s'

[build]

[env]
  PORT = '3000'
  TZ = 'America/Los_Angeles'

[[mounts]]
  source = 'toteflow_data'
  destination = '/app/data'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
